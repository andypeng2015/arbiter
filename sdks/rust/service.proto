syntax = "proto3";

package arbiter.v1;

option go_package = "github.com/odvcencio/arbiter/api/arbiter/v1;arbiterv1";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

service ArbiterService {
  rpc PublishBundle(PublishBundleRequest) returns (PublishBundleResponse);
  rpc ListBundles(ListBundlesRequest) returns (ListBundlesResponse);
  rpc ActivateBundle(ActivateBundleRequest) returns (ActivateBundleResponse);
  rpc RollbackBundle(RollbackBundleRequest) returns (RollbackBundleResponse);
  rpc GetBundle(GetBundleRequest) returns (GetBundleResponse);
  rpc WatchBundles(WatchBundlesRequest) returns (stream BundleEvent);
  rpc GetOverrides(GetOverridesRequest) returns (GetOverridesResponse);
  rpc WatchOverrides(WatchOverridesRequest) returns (stream OverrideEvent);
  rpc EvaluateRules(EvaluateRulesRequest) returns (EvaluateRulesResponse);
  rpc ResolveFlag(ResolveFlagRequest) returns (ResolveFlagResponse);
  rpc EvaluateStrategy(EvaluateStrategyRequest) returns (EvaluateStrategyResponse);
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);
  rpc RunSession(RunSessionRequest) returns (RunSessionResponse);
  rpc AssertFacts(AssertFactsRequest) returns (AssertFactsResponse);
  rpc RetractFacts(RetractFactsRequest) returns (RetractFactsResponse);
  rpc GetSessionTrace(GetSessionTraceRequest) returns (GetSessionTraceResponse);
  rpc CloseSession(CloseSessionRequest) returns (CloseSessionResponse);
  rpc SetRuleOverride(SetRuleOverrideRequest) returns (SetRuleOverrideResponse);
  rpc SetFlagOverride(SetFlagOverrideRequest) returns (SetFlagOverrideResponse);
  rpc SetFlagRuleOverride(SetFlagRuleOverrideRequest) returns (SetFlagRuleOverrideResponse);
  rpc SetStrategyOverride(SetStrategyOverrideRequest) returns (SetStrategyOverrideResponse);
}

service RuntimeService {
  rpc GetRuntimeCapabilities(GetRuntimeCapabilitiesRequest) returns (GetRuntimeCapabilitiesResponse);
  rpc GetRuntimeStatus(GetRuntimeStatusRequest) returns (GetRuntimeStatusResponse);
  rpc GetStatusIssueCatalog(GetStatusIssueCatalogRequest) returns (GetStatusIssueCatalogResponse);
}

service AgentService {
  rpc GetAgentStatus(GetAgentStatusRequest) returns (GetAgentStatusResponse);
  rpc GetStatusIssueCatalog(GetStatusIssueCatalogRequest) returns (GetStatusIssueCatalogResponse);
}

service ControlService {
  rpc GetControlStatus(GetControlStatusRequest) returns (GetControlStatusResponse);
  rpc GetStatusIssueCatalog(GetStatusIssueCatalogRequest) returns (GetStatusIssueCatalogResponse);
}

message PublishBundleRequest {
  string name = 1;
  bytes source = 2;
}

message PublishBundleResponse {
  string bundle_id = 1;
  string checksum = 2;
  uint32 rule_count = 3;
  uint32 flag_count = 4;
  google.protobuf.Timestamp published_at = 5;
  uint32 expert_rule_count = 6;
  uint32 strategy_count = 7;
}

message BundleSummary {
  string bundle_id = 1;
  string name = 2;
  string checksum = 3;
  google.protobuf.Timestamp published_at = 4;
  uint32 rule_count = 5;
  uint32 flag_count = 6;
  uint32 expert_rule_count = 7;
  bool active = 8;
  uint32 strategy_count = 9;
}

message ListBundlesRequest {
  string name = 1;
}

message ListBundlesResponse {
  repeated BundleSummary bundles = 1;
}

message ActivateBundleRequest {
  string name = 1;
  string bundle_id = 2;
}

message ActivateBundleResponse {
  BundleSummary bundle = 1;
}

message RollbackBundleRequest {
  string name = 1;
}

message RollbackBundleResponse {
  BundleSummary bundle = 1;
  string previous_bundle_id = 2;
}

message GetBundleRequest {
  string bundle_id = 1;
  string bundle_name = 2;
}

message GetBundleResponse {
  BundleSummary bundle = 1;
  bytes source = 2;
}

message WatchBundlesRequest {
  repeated string names = 1;
  bool active_only = 2;
}

enum BundleEventType {
  BUNDLE_EVENT_TYPE_UNSPECIFIED = 0;
  BUNDLE_EVENT_TYPE_SNAPSHOT = 1;
  BUNDLE_EVENT_TYPE_PUBLISHED = 2;
  BUNDLE_EVENT_TYPE_ACTIVATED = 3;
  BUNDLE_EVENT_TYPE_ROLLED_BACK = 4;
}

message BundleEvent {
  BundleEventType type = 1;
  string name = 2;
  BundleSummary bundle = 3;
  bytes source = 4;
  string previous_bundle_id = 5;
}

message GetOverridesRequest {
  string bundle_id = 1;
  string bundle_name = 2;
}

message GetOverridesResponse {
  BundleOverrides overrides = 1;
}

message WatchOverridesRequest {
  string bundle_id = 1;
}

enum OverrideEventType {
  OVERRIDE_EVENT_TYPE_UNSPECIFIED = 0;
  OVERRIDE_EVENT_TYPE_SNAPSHOT = 1;
  OVERRIDE_EVENT_TYPE_RULE = 2;
  OVERRIDE_EVENT_TYPE_FLAG = 3;
  OVERRIDE_EVENT_TYPE_FLAG_RULE = 4;
  OVERRIDE_EVENT_TYPE_STRATEGY = 5;
}

// Unspecified means no explicit kill-switch state is set.
enum KillSwitchState {
  KILL_SWITCH_STATE_UNSPECIFIED = 0;
  KILL_SWITCH_STATE_ON = 1;
  KILL_SWITCH_STATE_OFF = 2;
}

enum CapabilityOwner {
  CAPABILITY_OWNER_UNSPECIFIED = 0;
  CAPABILITY_OWNER_CORE = 1;
  CAPABILITY_OWNER_HOST = 2;
  CAPABILITY_OWNER_PLUGIN = 3;
}

message GetRuntimeCapabilitiesRequest {}

message GetRuntimeStatusRequest {}

message GetAgentStatusRequest {}

message GetControlStatusRequest {}

message GetStatusIssueCatalogRequest {}

message RuntimeSourceCapability {
  string scheme = 1;
  CapabilityOwner owner = 2;
  string description = 3;
}

message RuntimeHandlerCapability {
  string kind = 1;
  CapabilityOwner owner = 2;
  string description = 3;
}

message RuntimePluginInfo {
  string name = 1;
  string version = 2;
}

message RuntimeControlTransport {
  bool enabled = 1;
  string address = 2;
  bool public_listener = 3;
  bool auth_enabled = 4;
  bool tls_enabled = 5;
  bool mutual_tls_enabled = 6;
}

message RuntimeCapabilityTransport {
  bool configured = 1;
  string target = 2;
  bool auth_enabled = 3;
  bool tls_enabled = 4;
  string server_name = 5;
}

message GetRuntimeCapabilitiesResponse {
  repeated RuntimeSourceCapability sources = 1;
  repeated RuntimeHandlerCapability sinks = 2;
  repeated RuntimeHandlerCapability workers = 3;
  repeated RuntimePluginInfo plugins = 4;
  RuntimeControlTransport control_transport = 5;
  RuntimeCapabilityTransport capability_transport = 6;
}

message RuntimeTransportStatus {
  RuntimeControlTransport control = 1;
  RuntimeCapabilityTransport capability = 2;
}

message RuntimeCapabilitiesStatus {
  repeated RuntimePluginInfo plugins = 1;
  repeated RuntimeSourceCapability sources = 2;
  repeated RuntimeHandlerCapability sinks = 3;
  repeated RuntimeHandlerCapability workers = 4;
}

message RuntimeReadinessStatus {
  bool ready = 1;
  string reason = 2;
}

message RuntimeDeliveryStatus {
  uint64 delivered = 1;
  uint64 enqueued = 2;
  uint64 retried = 3;
}

message RuntimeSourceStatus {
  string target = 1;
  string alias = 2;
  bool available = 3;
  uint32 fact_count = 4;
  uint32 consecutive_failures = 5;
  string last_error = 6;
  google.protobuf.Timestamp last_attempt_at = 7;
  google.protobuf.Timestamp last_success_at = 8;
  google.protobuf.Timestamp next_retry_at = 9;
}

message RuntimeSinkStatus {
  string key = 1;
  string alias = 2;
  string kind = 3;
  string target = 4;
  bool available = 5;
  uint32 pending = 6;
  uint32 ambiguous = 7;
  uint32 consecutive_failures = 8;
  string last_error = 9;
  google.protobuf.Timestamp last_attempt_at = 10;
  google.protobuf.Timestamp last_success_at = 11;
  google.protobuf.Timestamp next_retry_at = 12;
}

message RuntimeActivityStatus {
  uint64 ticks = 1;
  uint64 errors = 2;
  google.protobuf.Timestamp last_tick = 3;
  RuntimeDeliveryStatus delivery = 4;
  repeated RuntimeSourceStatus source_status = 5;
  repeated RuntimeSinkStatus sink_status = 6;
}

message StatusIssue {
  string severity = 1;
  string scope = 2;
  string subject = 3;
  string code = 4;
  string message = 5;
  bool blocking = 6;
}

message StatusIssueDefinition {
  string code = 1;
  string severity = 2;
  string scope = 3;
  bool blocking = 4;
  string description = 5;
  repeated string surfaces = 6;
}

message GetStatusIssueCatalogResponse {
  repeated StatusIssueDefinition definitions = 1;
}

message GetRuntimeStatusResponse {
  RuntimeReadinessStatus readiness = 1;
  RuntimeTransportStatus transport = 2;
  RuntimeCapabilitiesStatus capabilities = 3;
  RuntimeActivityStatus activity = 4;
  repeated StatusIssue issues = 5;
}

message AgentControlTransport {
  bool enabled = 1;
  string address = 2;
  bool public_listener = 3;
  bool auth_enabled = 4;
  bool tls_enabled = 5;
  bool mutual_tls_enabled = 6;
}

message AgentUpstreamTransport {
  bool configured = 1;
  string target = 2;
  bool auth_enabled = 3;
  bool tls_enabled = 4;
  string server_name = 5;
}

message AgentTransportStatus {
  AgentControlTransport control = 1;
  AgentUpstreamTransport upstream = 2;
}

message AgentReadinessStatus {
  bool ready = 1;
  string reason = 2;
  int64 max_staleness_ms = 3;
  uint32 target_count = 4;
  uint32 ready_count = 5;
}

message AgentBundleSyncStatus {
  string name = 1;
  string bundle_id = 2;
  string checksum = 3;
  google.protobuf.Timestamp loaded_at = 4;
  google.protobuf.Timestamp bundle_synced_at = 5;
  google.protobuf.Timestamp override_synced_at = 6;
  int64 staleness_ms = 7;
  int64 override_staleness_ms = 8;
  bool bundle_watch_connected = 9;
  bool override_configured = 10;
  bool override_watch_connected = 11;
  int64 bundle_errors_total = 12;
  int64 override_errors_total = 13;
  int64 bundle_reconnects = 14;
  int64 override_reconnects = 15;
  string last_bundle_error = 16;
  google.protobuf.Timestamp last_bundle_error_at = 17;
  string last_override_error = 18;
  google.protobuf.Timestamp last_override_error_at = 19;
}

message AgentSyncStatus {
  string primary_name = 1;
  int64 bundle_errors_total = 2;
  int64 override_errors_total = 3;
  int64 bundle_reconnects_total = 4;
  int64 override_reconnects_total = 5;
  string last_upstream_error = 6;
  google.protobuf.Timestamp last_upstream_error_at = 7;
  repeated AgentBundleSyncStatus bundles = 8;
}

message GetAgentStatusResponse {
  AgentReadinessStatus readiness = 1;
  AgentTransportStatus transport = 2;
  AgentSyncStatus sync = 3;
  repeated StatusIssue issues = 4;
}

message ControlListenerTransport {
  bool enabled = 1;
  string address = 2;
  bool public_listener = 3;
  bool auth_enabled = 4;
  bool tls_enabled = 5;
  bool mutual_tls_enabled = 6;
}

message ControlTransportStatus {
  ControlListenerTransport control = 1;
}

message ControlReadinessStatus {
  bool ready = 1;
  string reason = 2;
}

message ControlBundleStatus {
  string name = 1;
  string bundle_id = 2;
  string checksum = 3;
  google.protobuf.Timestamp published_at = 4;
  uint32 published_versions = 5;
  uint32 rule_count = 6;
  uint32 flag_count = 7;
  uint32 expert_rule_count = 8;
  uint32 strategy_count = 9;
}

message ControlBundlesStatus {
  uint32 published_total = 1;
  uint32 active_total = 2;
  bool persisted = 3;
  string file = 4;
  repeated ControlBundleStatus active = 5;
  bool healthy = 6;
  uint64 writes_total = 7;
  uint64 errors_total = 8;
  google.protobuf.Timestamp last_success_at = 9;
  string last_error = 10;
  google.protobuf.Timestamp last_error_at = 11;
}

message ControlBundleOverrideStatus {
  string name = 1;
  string bundle_id = 2;
  uint32 rules = 3;
  uint32 flags = 4;
  uint32 flag_rules = 5;
  uint32 strategies = 6;
}

message ControlOverridesStatus {
  uint32 bundle_total = 1;
  uint32 rules = 2;
  uint32 flags = 3;
  uint32 flag_rules = 4;
  uint32 strategies = 5;
  bool persisted = 6;
  string file = 7;
  repeated ControlBundleOverrideStatus bundles = 8;
  bool healthy = 9;
  uint64 writes_total = 10;
  uint64 errors_total = 11;
  google.protobuf.Timestamp last_success_at = 12;
  string last_error = 13;
  google.protobuf.Timestamp last_error_at = 14;
}

message ControlSessionBundleStatus {
  string name = 1;
  string bundle_id = 2;
  uint32 active = 3;
}

message ControlSessionsStatus {
  uint32 active = 1;
  int64 ttl_ms = 2;
  uint32 max_count = 3;
  uint32 max_per_owner = 4;
  repeated ControlSessionBundleStatus bundles = 5;
}

message ControlAuditStatus {
  bool configured = 1;
  string kind = 2;
  bool durable = 3;
  string file = 4;
  bool healthy = 5;
  uint64 writes_total = 6;
  uint64 errors_total = 7;
  google.protobuf.Timestamp last_success_at = 8;
  string last_error = 9;
  google.protobuf.Timestamp last_error_at = 10;
}

message GetControlStatusResponse {
  ControlReadinessStatus readiness = 1;
  ControlTransportStatus transport = 2;
  ControlBundlesStatus bundles = 3;
  ControlOverridesStatus overrides = 4;
  ControlSessionsStatus sessions = 5;
  ControlAuditStatus audit = 6;
  repeated StatusIssue issues = 7;
}

message BundleOverrides {
  string bundle_id = 1;
  repeated RuleOverrideEntry rules = 2;
  repeated FlagOverrideEntry flags = 3;
  repeated FlagRuleOverrideEntry flag_rules = 4;
  repeated StrategyOverrideEntry strategies = 5;
}

message RuleOverrideEntry {
  string rule_name = 1;
  bool kill_switch_set = 2;
  bool kill_switch = 3;
  bool rollout_set = 4;
  uint32 rollout = 5;
  KillSwitchState kill_switch_state = 6;
}

message FlagOverrideEntry {
  string flag_key = 1;
  bool kill_switch_set = 2;
  bool kill_switch = 3;
  KillSwitchState kill_switch_state = 4;
}

message FlagRuleOverrideEntry {
  string flag_key = 1;
  uint32 rule_index = 2;
  bool rollout_set = 3;
  uint32 rollout = 4;
}

message StrategyOverrideEntry {
  string strategy_name = 1;
  string candidate_label = 2;
  bool kill_switch_set = 3;
  bool kill_switch = 4;
  bool rollout_set = 5;
  uint32 rollout = 6;
  KillSwitchState kill_switch_state = 7;
}

message OverrideEvent {
  OverrideEventType type = 1;
  string bundle_id = 2;
  BundleOverrides snapshot = 3;
  string rule_name = 4;
  RuleOverrideEntry rule = 5;
  string flag_key = 6;
  FlagOverrideEntry flag = 7;
  uint32 rule_index = 8;
  FlagRuleOverrideEntry flag_rule = 9;
  string strategy_name = 10;
  string candidate_label = 11;
  StrategyOverrideEntry strategy = 12;
}

message TraceStep {
  string check = 1;
  bool result = 2;
  string detail = 3;
  string phase = 4;
  string scope = 5;
  string subject = 6;
  string kind = 7;
  string target = 8;
}

message RuleMatch {
  string name = 1;
  int32 priority = 2;
  string action = 3;
  google.protobuf.Struct params = 4;
  bool fallback = 5;
}

message EvaluateRulesRequest {
  string bundle_id = 1;
  google.protobuf.Struct context = 2;
  string request_id = 3;
  string bundle_name = 4;
}

message EvaluateRulesResponse {
  repeated RuleMatch matched = 1;
  repeated TraceStep trace = 2;
}

message ResolveFlagRequest {
  string bundle_id = 1;
  string flag_key = 2;
  google.protobuf.Struct context = 3;
  string request_id = 4;
  string bundle_name = 5;
}

message ResolveFlagResponse {
  string variant = 1;
  google.protobuf.Struct values = 2;
  bool is_default = 3;
  string reason = 4;
  repeated TraceStep trace = 5;
}

message EvaluateStrategyRequest {
  string bundle_id = 1;
  string strategy_name = 2;
  google.protobuf.Struct context = 3;
  string request_id = 4;
  string bundle_name = 5;
}

message EvaluateStrategyResponse {
  string outcome = 1;
  string selected = 2;
  google.protobuf.Struct params = 3;
  repeated TraceStep trace = 4;
}

message ExpertFact {
  string type = 1;
  string key = 2;
  google.protobuf.Struct fields = 3;
}

message ExpertOutcome {
  string rule = 1;
  string name = 2;
  google.protobuf.Struct params = 3;
}

message ExpertActivation {
  uint32 round = 1;
  string rule = 2;
  string kind = 3;
  string target = 4;
  google.protobuf.Struct params = 5;
  bool changed = 6;
  string detail = 7;
  repeated TraceStep trace = 8;
}

message StartSessionRequest {
  string bundle_id = 1;
  google.protobuf.Struct envelope = 2;
  repeated ExpertFact facts = 3;
  string bundle_name = 4;
}

message StartSessionResponse {
  string session_id = 1;
  uint32 expert_rule_count = 2;
}

message RunSessionRequest {
  string session_id = 1;
  string request_id = 2;
}

message RunSessionResponse {
  repeated ExpertOutcome outcomes = 1;
  repeated ExpertFact facts = 2;
  repeated ExpertActivation activations = 3;
  string stop_reason = 4;
  uint32 rounds = 5;
  uint32 mutations = 6;
}

message AssertFactsRequest {
  string session_id = 1;
  repeated ExpertFact facts = 2;
}

message AssertFactsResponse {}

message FactRef {
  string type = 1;
  string key = 2;
}

message RetractFactsRequest {
  string session_id = 1;
  repeated FactRef facts = 2;
}

message RetractFactsResponse {}

message GetSessionTraceRequest {
  string session_id = 1;
}

message GetSessionTraceResponse {
  repeated ExpertOutcome outcomes = 1;
  repeated ExpertFact facts = 2;
  repeated ExpertActivation activations = 3;
  string stop_reason = 4;
  uint32 rounds = 5;
  uint32 mutations = 6;
}

message CloseSessionRequest {
  string session_id = 1;
}

message CloseSessionResponse {}

message SetRuleOverrideRequest {
  string bundle_id = 1;
  string rule_name = 2;
  google.protobuf.BoolValue kill_switch = 3;
  google.protobuf.UInt32Value rollout = 4;
}

message SetRuleOverrideResponse {}

message SetFlagOverrideRequest {
  string bundle_id = 1;
  string flag_key = 2;
  google.protobuf.BoolValue kill_switch = 3;
}

message SetFlagOverrideResponse {}

message SetFlagRuleOverrideRequest {
  string bundle_id = 1;
  string flag_key = 2;
  uint32 rule_index = 3;
  google.protobuf.UInt32Value rollout = 4;
}

message SetFlagRuleOverrideResponse {}

message SetStrategyOverrideRequest {
  string bundle_id = 1;
  string strategy_name = 2;
  string candidate_label = 3;
  google.protobuf.BoolValue kill_switch = 4;
  google.protobuf.UInt32Value rollout = 5;
}

message SetStrategyOverrideResponse {}
